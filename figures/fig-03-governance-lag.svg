<svg xmlns="http://www.w3.org/2000/svg" width="760" height="210" viewBox="0 0 760 210" font-family="Helvetica Neue, Arial, sans-serif" role="img">
<title>Governance Lag is the elapsed time between the inappropriateness event and detection</title>
<rect width="760" height="210" fill="#FBFBF9"/>
<defs><marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#5B6572" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="30" y="32" font-size="15" fill="#21272E" text-anchor="start" font-weight="600" >Governance Lag: the latency before governance begins</text>
<line x1="60" y1="120" x2="700" y2="120" stroke="#5B6572" stroke-width="1.4" marker-end="url(#a3)"/>
<rect x="170" y="94" width="330" height="52" fill="#FBF3E2" stroke="#B97D10" stroke-width="1" rx="4"/>
<text x="335" y="125" font-size="13" fill="#B97D10" text-anchor="middle" font-weight="600" >risk window = GL</text>
<line x1="170" y1="86" x2="170" y2="154" stroke="#21272E" stroke-width="1.4"/>
<text x="170" y="76" font-size="12" fill="#21272E" text-anchor="middle" font-weight="600" >T(inappropriateness)</text>
<text x="170" y="172" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >business event: termination, role change,</text>
<text x="170" y="186" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >project end, contract end, NHI retirement</text>
<line x1="500" y1="86" x2="500" y2="154" stroke="#21272E" stroke-width="1.4"/>
<text x="500" y="76" font-size="12" fill="#21272E" text-anchor="middle" font-weight="600" >T(detection)</text>
<text x="500" y="172" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >certification decision, automated flag,</text>
<text x="500" y="186" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >or manual review</text>
<text x="600" y="108" font-size="11" fill="#5B6572" text-anchor="middle" font-weight="normal" font-style="italic">remediation</text>
</svg>
