<svg xmlns="http://www.w3.org/2000/svg" width="760" height="286" viewBox="0 0 760 286" font-family="Helvetica Neue, Arial, sans-serif" role="img">
<title>Trust Gradient combines four weighted signals into a confidence score that prioritizes review attention</title>
<rect width="760" height="286" fill="#FBFBF9"/>
<defs><marker id="a5" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#5B6572" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="30" y="30" font-size="15" fill="#21272E" text-anchor="start" font-weight="600" >Trust Gradient: a weighted composite, calibrated against outcomes</text>
<rect x="40" y="56" width="190" height="32" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="135" y="76" font-size="12" fill="#21272E" text-anchor="middle" font-weight="normal" >TimeSinceValidation</text>
