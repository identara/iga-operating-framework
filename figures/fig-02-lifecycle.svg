<svg xmlns="http://www.w3.org/2000/svg" width="760" height="268" viewBox="0 0 760 268" font-family="Helvetica Neue, Arial, sans-serif" role="img">
<title>Lifecycle: kick start once, then run, maintain, and upgrade as a loop</title>
<rect width="760" height="268" fill="#FBFBF9"/>
<defs><marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#5B6572" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="30" y="32" font-size="15" fill="#21272E" text-anchor="start" font-weight="600" >Four moments in a program's life</text>
<rect x="60" y="90" width="170" height="52" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="145" y="112" font-size="14" fill="#21272E" text-anchor="middle" font-weight="600" >Kick start</text>
<text x="145" y="130" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >build in chapter order</text>
<rect x="260" y="90" width="170" height="52" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="345" y="112" font-size="14" fill="#21272E" text-anchor="middle" font-weight="600" >Run</text>
<text x="345" y="130" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >worksheets as operating documents</text>
<rect x="460" y="90" width="170" height="52" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="545" y="112" font-size="14" fill="#21272E" text-anchor="middle" font-weight="600" >Maintain</text>
<text x="545" y="130" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >review cycles, failure-mode checks</text>
<rect x="260" y="190" width="170" height="52" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="345" y="212" font-size="14" fill="#21272E" text-anchor="middle" font-weight="600" >Upgrade</text>
<text x="345" y="230" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >gap-assess against the decisions</text>
<line x1="230" y1="116" x2="256" y2="116" stroke="#5B6572" stroke-width="1.2" marker-end="url(#a2)"/>
<line x1="430" y1="116" x2="456" y2="116" stroke="#5B6572" stroke-width="1.2" marker-end="url(#a2)"/>
<line x1="540" y1="142" x2="400" y2="196" stroke="#5B6572" stroke-width="1.2" marker-end="url(#a2)"/>
<line x1="345" y1="186" x2="345" y2="146" stroke="#5B6572" stroke-width="1.2" marker-end="url(#a2)"/>
<text x="60" y="168" font-size="11" fill="#5B6572" text-anchor="start" font-weight="normal" font-style="italic">once</text>
<text x="600" y="175" font-size="10" fill="#5B6572" text-anchor="start" font-weight="normal" >each unmet statement</text>
<text x="600" y="189" font-size="10" fill="#5B6572" text-anchor="start" font-weight="normal" >becomes a backlog item</text>
</svg>
