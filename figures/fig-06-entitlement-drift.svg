<svg xmlns="http://www.w3.org/2000/svg" width="760" height="286" viewBox="0 0 760 286" font-family="Helvetica Neue, Arial, sans-serif" role="img">
<title>Entitlement Drift Rate reads grants, removals, and unreviewed accumulation over one declared window</title>
<rect width="760" height="286" fill="#FBFBF9"/>
<defs><marker id="a6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#5B6572" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker><marker id="a6g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#0E7C6B" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="30" y="30" font-size="15" fill="#21272E" text-anchor="start" font-weight="600" >Entitlement Drift Rate: three readings of one window</text>
<rect x="160" y="60" width="300" height="140" rx="8" fill="#FBFBF9" stroke="#21272E" stroke-width="1"/>
<text x="310" y="82" font-size="12" fill="#21272E" text-anchor="middle" font-weight="600" >measurement window</text>
<text x="310" y="98" font-size="11" fill="#5B6572" text-anchor="middle" font-weight="normal" >I identities · D days</text>
<line x1="60" y1="130" x2="156" y2="130" stroke="#0E7C6B" stroke-width="1.6" marker-end="url(#a6g)"/>
<text x="100" y="120" font-size="11" fill="#0E7C6B" text-anchor="middle" font-weight="normal" >G grants in</text>
<line x1="464" y1="130" x2="560" y2="130" stroke="#5B6572" stroke-width="1.6" marker-end="url(#a6)"/>
<text x="516" y="120" font-size="11" fill="#5B6572" text-anchor="middle" font-weight="normal" >R removals out</text>
<rect x="200" y="150" width="220" height="34" rx="6" fill="#FBF3E2" stroke="#B97D10" stroke-width="1"/>
<text x="310" y="171" font-size="11" fill="#B97D10" text-anchor="middle" font-weight="600" >U unreviewed accumulate</text>
<rect x="60" y="222" width="204" height="40" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="162" y="240" font-size="12" fill="#21272E" text-anchor="middle" font-weight="600" >GEV = G / (I x D)</text>
<text x="162" y="256" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >churn</text>
<rect x="284" y="222" width="204" height="40" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="386" y="240" font-size="12" fill="#21272E" text-anchor="middle" font-weight="600" >NED = (G - R) / (I x D)</text>
<text x="386" y="256" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >direction</text>
<rect x="508" y="222" width="204" height="40" rx="6" fill="#F1F4F6" stroke="#C9CFD6" stroke-width="1"/>
<text x="610" y="240" font-size="12" fill="#21272E" text-anchor="middle" font-weight="600" >UED = U / (I x D)</text>
<text x="610" y="256" font-size="10" fill="#5B6572" text-anchor="middle" font-weight="normal" >governance debt</text>
</svg>
