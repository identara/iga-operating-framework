<svg xmlns="http://www.w3.org/2000/svg" width="760" height="262" viewBox="0 0 760 262" font-family="Helvetica Neue, Arial, sans-serif" role="img">
<title>Justification Half-Life is the time at which the probability of revocation or disuse reaches one half, and it differs by access category</title>
<rect width="760" height="262" fill="#FBFBF9"/>
<defs><marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9" fill="none" stroke="#5B6572" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="30" y="30" font-size="15" fill="#21272E" text-anchor="start" font-weight="600" >Justification Half-Life: relevance decays at category-specific rates</text>
<line x1="80" y1="220" x2="80" y2="70" stroke="#5B6572" stroke-width="1.2" marker-end="url(#a4)"/>
<line x1="80" y1="220" x2="640" y2="220" stroke="#5B6572" stroke-width="1.2" marker-end="url(#a4)"/>
<text x="80" y="58" font-size="11" fill="#5B6572" text-anchor="start" font-weight="normal" >P(justification still relevant)</text>
