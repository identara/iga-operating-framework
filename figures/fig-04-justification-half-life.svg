<path d="M 80 70 Q 310 86 500 145.0 T 640 178" fill="none" stroke="#0E7C6B" stroke-width="2"/>
<line x1="230" y1="145.0" x2="230" y2="220" stroke="#B97D10" stroke-width="1" stroke-dasharray="3 3"/>
