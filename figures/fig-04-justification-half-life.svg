<text x="72" y="84" font-size="10" fill="#5B6572" text-anchor="end" font-weight="normal" >1.0</text>
<text x="72" y="149.0" font-size="10" fill="#5B6572" text-anchor="end" font-weight="normal" >0.5</text>
<line x1="80" y1="145.0" x2="640" y2="145.0" stroke="#C9CFD6" stroke-width="1" stroke-dasharray="4 4"/>
